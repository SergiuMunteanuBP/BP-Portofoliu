<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofoliu Investițional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        
        .sticky-col { position: sticky; background: white; z-index: 30; border-right: 1px solid #e2e8f0; }
        .col-1 { left: 0; min-width: 80px; font-size: 10px; color: #64748b; }
        .col-2 { left: 80px; min-width: 180px; font-weight: 700; }
        .col-3 { left: 260px; min-width: 80px; color: #3b82f6; font-size: 11px; }
        .col-4 { left: 340px; min-width: 80px; color: #64748b; font-size: 11px; }
        .col-5 { left: 420px; min-width: 60px; border-right: 4px solid #cbd5e1; font-family: monospace; }

        .table-container { overflow-x: auto; max-height: 75vh; border-radius: 12px; border: 1px solid #e2e8f0; background: white; }
        .month-input { width: 70px; text-align: right; font-size: 11px; padding: 4px; border-bottom: 1px solid #f1f5f9; outline: none; background: transparent; }
        .month-input:focus { background: #fff; border-bottom: 2px solid #3b82f6; }
        
        .year-total-col { background: #f8fafc; font-weight: 800; color: #1e293b; border-right: 2px solid #e2e8f0; min-width: 100px; text-align: right; padding-right: 10px; }
        .tab-btn.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .year-header-btn { background: #1e293b; color: white; padding: 5px 10px; border-radius: 6px; font-size: 11px; }
        
        .delete-btn { color: #ef4444; opacity: 0; transition: opacity 0.2s; cursor: pointer; }
        tr:hover .delete-btn { opacity: 1; }
    </style>
</head>
<body>

    <header class="bg-white border-b sticky top-0 z-[100] px-6 py-4 shadow-sm">
        <div class="max-w-[1900px] mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-slate-900 text-white p-2 rounded-xl"><i class="fas fa-briefcase fa-lg"></i></div>
                <h1 class="text-xl font-black tracking-tighter uppercase">Portofoliu <span class="text-blue-600">Investițional</span></h1>
            </div>

            <div class="flex items-center gap-6">
                <div class="flex gap-4 border-r pr-6">
                    <div class="text-center">
                        <p class="text-[9px] font-black text-slate-400 uppercase">EUR/MDL</p>
                        <input type="number" id="cEUR" value="19.7215" step="0.0001" class="w-20 font-bold bg-transparent outline-none border-b border-dashed border-slate-200" oninput="updateAllCalculations()">
                    </div>
                    <div class="text-center">
                        <p class="text-[9px] font-black text-slate-400 uppercase">USD/MDL</p>
                        <input type="number" id="cUSD" value="16.6933" step="0.0001" class="w-20 font-bold bg-transparent outline-none border-b border-dashed border-slate-200" oninput="updateAllCalculations()">
                    </div>
                    <div class="text-center">
                        <p class="text-[9px] font-black text-slate-400 uppercase">RON/MDL</p>
                        <input type="number" id="cRON" value="3.8863" step="0.0001" class="w-20 font-bold bg-transparent outline-none border-b border-dashed border-slate-200" oninput="updateAllCalculations()">
                    </div>
                </div>
                <div class="bg-blue-600 text-white px-8 py-3 rounded-2xl shadow-lg text-right min-w-[200px]">
                    <p class="text-[10px] uppercase opacity-70 font-bold">Total Portofoliu la zi</p>
                    <p id="topTotal" class="text-xl font-black">0.00 MDL</p>
                </div>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b mb-6 px-6 shadow-sm">
        <div class="max-w-[1900px] mx-auto flex gap-10">
            <button onclick="showTab('tab-summary')" id="btn-summary" class="tab-btn py-5 text-sm font-bold active transition-all">Situația la zi</button>
            <button onclick="showTab('tab-matrix')" id="btn-matrix" class="tab-btn py-5 text-sm font-bold text-slate-400 italic">Alocări</button>
            <button onclick="showTab('tab-income')" id="btn-income" class="tab-btn py-5 text-sm font-bold text-slate-400">Dividende & Cupoane</button>
            <button onclick="showTab('tab-calendar')" id="btn-calendar" class="tab-btn py-5 text-sm font-bold text-emerald-600"><i class="fas fa-calendar-alt mr-2"></i>Calendar Venituri</button>
        </div>
    </nav>

    <main class="max-w-[1900px] mx-auto px-6 pb-20">

        <section id="tab-summary" class="tab-content grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white rounded-3xl shadow-sm border p-8">
                <h3 class="font-black text-slate-400 uppercase text-[11px] mb-6">Analiză Instrumente</h3>
                <div id="summaryTable" class="overflow-x-auto text-sm"></div>
            </div>
            <div class="bg-white rounded-3xl shadow-sm border p-8">
                <h3 class="font-black text-slate-400 uppercase text-[11px] mb-6 text-center">Structură Asset Class</h3>
                <canvas id="chartAllocation"></canvas>
            </div>
        </section>

        <section id="tab-matrix" class="tab-content hidden">
            <div class="bg-white rounded-3xl shadow-sm border p-6">
                <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
                    <h3 class="font-black text-slate-800 uppercase text-xs tracking-widest italic">Matrix Alocări Sume Nominale (2024-2040)</h3>
                    <div class="flex gap-3">
                        <button onclick="exportData()" class="text-[10px] font-bold bg-slate-100 px-4 py-2 rounded-lg">Backup</button>
                        <button onclick="openModal()" class="bg-slate-900 text-white px-5 py-2 rounded-lg text-[10px] font-black shadow-md">+ Instrument</button>
                    </div>
                </div>
                <div class="table-container">
                    <table class="w-full border-collapse">
                        <thead id="matrixHead"></thead>
                        <tbody id="matrixBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="tab-income" class="tab-content hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-3xl border shadow-sm h-fit">
                <h3 class="font-black mb-6 uppercase text-sm">Adaugă Venit</h3>
                <div class="space-y-4">
                    <select id="inc-inst" class="w-full border p-3 rounded-xl bg-slate-50 font-bold outline-none"></select>
                    <input type="date" id="inc-date" class="w-full border p-3 rounded-xl bg-slate-50 font-bold">
                    <input type="number" id="inc-val" placeholder="Suma" class="w-full border p-3 rounded-xl bg-slate-50 font-bold">
                    <button onclick="saveIncome()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-black shadow-lg">SALVEAZĂ</button>
                </div>
            </div>
            <div class="lg:col-span-2 bg-white rounded-3xl border shadow-sm p-8">
                <h3 class="font-black text-slate-400 uppercase text-[10px] mb-6">Istoric Venituri</h3>
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50 border-b">
                        <tr><th class="p-4">Data</th><th>Activ</th><th>Suma Orig.</th><th class="text-right">MDL</th><th></th></tr>
                    </thead>
                    <tbody id="incomeBody"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-calendar" class="tab-content hidden">
            <div class="bg-white rounded-3xl border shadow-sm p-10">
                <div class="flex justify-between items-center mb-10">
                    <h3 class="font-black text-2xl flex items-center gap-3"><i class="fas fa-calendar-check text-emerald-500"></i> Calendar Venituri</h3>
                    <div class="flex items-center gap-3 bg-slate-100 p-2 rounded-xl">
                        <span class="text-xs font-bold uppercase text-slate-500 tracking-tighter">Alege Anul:</span>
                        <select id="cal-year-selector" onchange="renderCalendar()" class="bg-white border rounded px-4 py-1 font-bold outline-none">
                            <option value="2024">2024</option><option value="2025" selected>2025</option><option value="2026">2026</option><option value="2027">2027</option>
                            <option value="2028">2028</option><option value="2029">2029</option><option value="2030">2030</option><option value="2031">2031</option>
                            <option value="2032">2032</option><option value="2033">2033</option><option value="2034">2034</option><option value="2035">2035</option>
                            <option value="2036">2036</option><option value="2037">2037</option><option value="2038">2038</option><option value="2039">2039</option>
                            <option value="2040">2040</option>
                        </select>
                    </div>
                </div>
                <div id="calendarView" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
            </div>
        </section>
    </main>

    <div id="addModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-10 w-full max-w-xl shadow-2xl">
            <h2 class="text-2xl font-black mb-8 uppercase tracking-tighter">Instrument Nou</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="mName" placeholder="Nume Instrument" class="md:col-span-2 border p-4 rounded-2xl bg-slate-50 font-bold outline-none">
                <select id="mCat" class="border p-4 rounded-2xl bg-slate-50 font-bold outline-none"><option>Acțiuni</option><option>Obligațiuni</option><option>Aur</option><option>Crypto</option><option>Cash</option></select>
                <input type="text" id="mSym" placeholder="Simbol" class="border p-4 rounded-2xl bg-slate-50 font-bold outline-none">
                <input type="text" id="mEx" placeholder="Bursă" class="border p-4 rounded-2xl bg-slate-50 font-bold outline-none">
                <select id="mCurr" class="border p-4 rounded-2xl bg-slate-50 font-bold outline-none"><option>RON</option><option>EUR</option><option>USD</option><option>MDL</option></select>
            </div>
            <div class="flex gap-6 mt-10">
                <button onclick="closeModal()" class="flex-1 font-bold text-slate-400">Anulează</button>
                <button onclick="confirmAdd()" class="flex-1 bg-blue-600 text-white rounded-2xl font-bold py-4 shadow-lg">Adaugă</button>
            </div>
        </div>
    </div>

    <script>
        let instruments = JSON.parse(localStorage.getItem('v5_inst')) || [
            { id: 1, cat: "Acțiuni", name: "FDI ETF BET Patria", sym: "TVBETETF", bursa: "BVB", curr: "RON" },
            { id: 2, cat: "Acțiuni", name: "OMV Petrom", sym: "SNP", bursa: "BVB", curr: "RON" }
        ];
        let allocations = JSON.parse(localStorage.getItem('v5_alloc')) || {};
        let incomes = JSON.parse(localStorage.getItem('v5_inc')) || [];
        let expandedYears = [2025]; 

        const years = Array.from({length: 17}, (_, i) => 2024 + i);
        const months = ["Ian", "Feb", "Mar", "Apr", "Mai", "Iun", "Iul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        let myChart;

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'text-slate-900'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('btn-' + id.split('-')[1]).classList.add('active');
            
            if(id === 'tab-matrix') renderMatrix();
            updateAllCalculations();
        }

        function updateAllCalculations() {
            const ron = parseFloat(document.getElementById('cRON').value) || 0;
            const eur = parseFloat(document.getElementById('cEUR').value) || 0;
            const usd = parseFloat(document.getElementById('cUSD').value) || 0;
            
            let grandTotalMDL = 0;
            let catStats = {};
            let listSummary = [];

            instruments.forEach(inst => {
                let m = inst.curr==='RON'?ron : inst.curr==='EUR'?eur : inst.curr==='USD'?usd : 1;
                let lastVal = 0;
                
                for(let y=2040; y>=2024; y--) {
                    for(let mi=11; mi>=0; mi--) {
                        let v = allocations[`${inst.id}-${y}-${months[mi]}`] || 0;
                        if(v > 0) { lastVal = v; break; }
                    }
                    if(lastVal > 0) break;
                }

                let valMDL = lastVal * m;
                grandTotalMDL += valMDL;
                catStats[inst.cat] = (catStats[inst.cat] || 0) + valMDL;
                listSummary.push({...inst, valMDL, nominal: lastVal});
            });

            document.getElementById('topTotal').innerText = grandTotalMDL.toLocaleString(undefined, {minimumFractionDigits: 2}) + " MDL";
            
            renderSummary(listSummary, grandTotalMDL);
            renderChart(catStats);
            renderIncomes();
            renderCalendar();
            populateIncSelect();
            updateYearTotalsOnly();
        }

        function updateYearTotalsOnly() {
            instruments.forEach(inst => {
                years.forEach(y => {
                    let yearSum = 0;
                    months.forEach(m => yearSum += (allocations[`${inst.id}-${y}-${m}`] || 0));
                    let cell = document.getElementById(`total-${inst.id}-${y}`);
                    if(cell) cell.innerText = yearSum.toLocaleString();
                });
            });
        }

        function renderSummary(data, total) {
            let html = `<table class="w-full text-left"><thead class="bg-slate-50 text-slate-400 uppercase text-[10px] font-black">
                <tr><th class="p-5">Instrument</th><th>Simbol</th><th class="text-right">Valoare Orig.</th><th>Valuta</th><th class="text-right p-5 text-blue-600">Echivalent MDL</th><th>Pondere %</th></tr>
                </thead><tbody>`;
            data.filter(x => x.valMDL > 0).sort((a,b) => b.valMDL - a.valMDL).forEach(x => {
                let p = total > 0 ? ((x.valMDL / total) * 100).toFixed(2) : 0;
                html += `<tr class="border-b hover:bg-slate-50"><td class="p-5 font-bold">${x.name}</td><td><span class="bg-slate-100 px-2 py-1 rounded text-xs font-mono">${x.sym}</span></td>
                <td class="text-right font-bold text-slate-700">${x.nominal.toLocaleString()}</td><td class="text-slate-400 font-mono text-xs">${x.curr}</td>
                <td class="text-right font-black text-slate-900">${x.valMDL.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                <td><div class="flex items-center gap-2"><div class="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="bg-blue-600 h-full" style="width:${p}%"></div></div><span class="text-[9px] font-black">${p}%</span></div></td></tr>`;
            });
            document.getElementById('summaryTable').innerHTML = html + `</tbody></table>`;
        }

        function renderMatrix() {
            let h1 = `<tr><th class="sticky-col col-1 p-3 bg-slate-100">Tip</th><th class="sticky-col col-2 p-3 bg-slate-100">Instrument</th><th class="sticky-col col-3 p-3 bg-slate-100">Bursa</th><th class="sticky-col col-4 p-3 bg-slate-100 text-center">Simbol</th><th class="sticky-col col-5 p-3 bg-slate-100 text-center">Valuta</th>`;
            let h2 = `<tr><th colspan="5" class="sticky-col border-r-[4px] border-slate-200 bg-slate-50"></th>`;
            
            years.forEach(y => {
                let isExp = expandedYears.includes(y);
                h1 += `<th colspan="${isExp ? 13 : 1}" class="border-x border-slate-700 bg-slate-900 text-white p-1 text-[10px] text-center">
                    <button onclick="toggleYear(${y})" class="year-header-btn">${isExp ? '-' : '+'} ${y}</button>
                </th>`;
                h2 += `<th class="year-total-col text-[10px]">TOTAL ${y}</th>`;
                if(isExp) months.forEach(m => h2 += `<th class="p-1 text-[9px] text-slate-400 font-bold bg-white border">${m}</th>`);
            });
            document.getElementById('matrixHead').innerHTML = h1 + "</tr>" + h2 + "</tr>";

            let body = '';
            instruments.forEach(inst => {
                body += `<tr class="hover:bg-slate-50 border-b group">
                    <td class="sticky-col col-1 p-2 text-[9px] uppercase font-bold text-slate-400">${inst.cat}</td>
                    <td class="sticky-col col-2 p-2 flex justify-between items-center text-xs font-bold">${inst.name} <button onclick="deleteInst(${inst.id})" class="delete-btn"><i class="fas fa-trash"></i></button></td>
                    <td class="sticky-col col-3 p-2 text-[10px] text-slate-400 italic">${inst.bursa}</td>
                    <td class="sticky-col col-4 p-2 text-center font-bold text-blue-600 text-[10px]">${inst.sym}</td>
                    <td class="sticky-col col-5 p-2 text-center font-mono text-[10px] border-r-[4px] border-slate-200">${inst.curr}</td>`;
                
                years.forEach(y => {
                    let isExp = expandedYears.includes(y);
                    body += `<td class="year-total-col text-xs" id="total-${inst.id}-${y}">0</td>`;
                    if(isExp) {
                        months.forEach(m => {
                            let k = `${inst.id}-${y}-${m}`;
                            let v = allocations[k] || '';
                            body += `<td class="p-0 border border-slate-100"><input type="number" class="month-input" value="${v}" oninput="saveAlloc('${k}', this.value, ${inst.id}, ${y})"></td>`;
                        });
                    }
                });
                body += `</tr>`;
            });
            document.getElementById('matrixBody').innerHTML = body;
            updateYearTotalsOnly();
        }

        function saveAlloc(k, v, instId, year) {
            if(v === "" || v == 0) delete allocations[k];
            else allocations[k] = parseFloat(v);
            localStorage.setItem('v5_alloc', JSON.stringify(allocations));
            
            const ron = parseFloat(document.getElementById('cRON').value) || 0;
            const eur = parseFloat(document.getElementById('cEUR').value) || 0;
            const usd = parseFloat(document.getElementById('cUSD').value) || 0;
            
            let grandTotalMDL = 0;
            let catStats = {};
            let listSummary = [];

            instruments.forEach(inst => {
                let multiplier = inst.curr==='RON'?ron : inst.curr==='EUR'?eur : inst.curr==='USD'?usd : 1;
                let lastVal = 0;
                for(let yr=2040; yr>=2024; yr--) {
                    for(let mi=11; mi>=0; mi--) {
                        let val = allocations[`${inst.id}-${yr}-${months[mi]}`] || 0;
                        if(val > 0) { lastVal = val; break; }
                    }
                    if(lastVal > 0) break;
                }
                let valMDL = lastVal * multiplier;
                grandTotalMDL += valMDL;
                catStats[inst.cat] = (catStats[inst.cat] || 0) + valMDL;
                listSummary.push({...inst, valMDL, nominal: lastVal});
            });

            document.getElementById('topTotal').innerText = grandTotalMDL.toLocaleString(undefined, {minimumFractionDigits: 2}) + " MDL";
            renderSummary(listSummary, grandTotalMDL);
            renderChart(catStats);

            let yearSum = 0;
            months.forEach(m => yearSum += (allocations[`${instId}-${year}-${m}`] || 0));
            document.getElementById(`total-${instId}-${year}`).innerText = yearSum.toLocaleString();
        }

        function toggleYear(y) {
            if(expandedYears.includes(y)) expandedYears = expandedYears.filter(i => i !== y);
            else expandedYears.push(y);
            renderMatrix();
        }

        function saveIncome() {
            let id = document.getElementById('inc-inst').value;
            let val = parseFloat(document.getElementById('inc-val').value);
            let date = document.getElementById('inc-date').value;
            if(!val || !date) return alert("Date incomplete!");
            let inst = instruments.find(x => x.id == id);
            incomes.push({ id: Date.now(), name: inst.name, val, date, curr: inst.curr });
            localStorage.setItem('v5_inc', JSON.stringify(incomes));
            updateAllCalculations();
        }

        function deleteIncome(id) {
            incomes = incomes.filter(x => x.id !== id);
            localStorage.setItem('v5_inc', JSON.stringify(incomes));
            updateAllCalculations();
        }

        function renderIncomes() {
            const ron = parseFloat(document.getElementById('cRON').value) || 0;
            const eur = parseFloat(document.getElementById('cEUR').value) || 0;
            const usd = parseFloat(document.getElementById('cUSD').value) || 0;
            let html = '';
            incomes.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(inc => {
                let mult = inc.curr === 'RON' ? ron : inc.curr === 'EUR' ? eur : inc.curr === 'USD' ? usd : 1;
                html += `<tr class="border-b"><td class="p-4 text-xs font-bold">${new Date(inc.date).toLocaleDateString()}</td><td class="font-bold uppercase text-[10px] text-slate-700">${inc.name}</td>
                <td class="text-slate-500 font-bold text-xs">${inc.val.toLocaleString()} ${inc.curr}</td><td class="text-right font-black text-emerald-600">${(inc.val * mult).toLocaleString()} MDL</td>
                <td class="text-right"><button onclick="deleteIncome(${inc.id})" class="text-red-300 hover:text-red-500"><i class="fas fa-trash"></i></button></td></tr>`;
            });
            document.getElementById('incomeBody').innerHTML = html;
        }

        function renderCalendar() {
            const selY = parseInt(document.getElementById('cal-year-selector').value);
            const ron = parseFloat(document.getElementById('cRON').value) || 0;
            const eur = parseFloat(document.getElementById('cEUR').value) || 0;
            const usd = parseFloat(document.getElementById('cUSD').value) || 0;
            let html = '';
            months.forEach((m, idx) => {
                let monthItems = incomes.filter(inc => {
                    let d = new Date(inc.date);
                    return d.getMonth() === idx && d.getFullYear() === selY;
                });
                let monthT = 0;
                let itemsList = monthItems.map(inc => {
                    let mlt = inc.curr==='RON'?ron:inc.curr==='EUR'?eur:inc.curr==='USD'?usd:1;
                    monthT += (inc.val * mlt);
                    return `<div class="flex justify-between text-[9px] border-b border-slate-50 py-1.5 font-bold uppercase"><span class="text-slate-400">${inc.name}</span><span class="text-emerald-600">+${inc.val.toLocaleString()}</span></div>`;
                }).join('');
                html += `<div class="bg-white p-5 rounded-[25px] border shadow-sm ${monthT > 0 ? 'border-emerald-500 bg-emerald-50/10' : 'opacity-40'}">
                    <div class="flex justify-between items-center mb-3"><span class="font-black text-slate-800 text-[10px] uppercase">${m}</span><span class="text-[8px] font-bold text-slate-300">${selY}</span></div>
                    <div class="min-h-[50px] space-y-1">${itemsList || '<p class="text-[9px] text-slate-200 italic">Fără venituri</p>'}</div>
                    <div class="mt-3 pt-3 border-t border-slate-50 font-black text-right text-[10px] text-slate-700">${monthT.toLocaleString()} MDL</div>
                </div>`;
            });
            document.getElementById('calendarView').innerHTML = html;
        }

        function renderChart(data) {
            const ctx = document.getElementById('chartAllocation').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: ['#0f172a', '#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#94a3b8'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '82%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 9, weight: 'bold' } } } } }
            });
        }

        function deleteInst(id) {
            if(confirm("Ștergi instrumentul și toate datele?")) {
                instruments = instruments.filter(x => x.id !== id);
                localStorage.setItem('v5_inst', JSON.stringify(instruments));
                renderMatrix();
                updateAllCalculations();
            }
        }

        function openModal() { document.getElementById('addModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('addModal').classList.add('hidden'); }
        function confirmAdd() {
            let n = document.getElementById('mName').value; if(!n) return;
            instruments.push({ id: Date.now(), cat: document.getElementById('mCat').value, name: n, sym: document.getElementById('mSym').value, bursa: document.getElementById('mEx').value, curr: document.getElementById('mCurr').value });
            localStorage.setItem('v5_inst', JSON.stringify(instruments));
            closeModal(); renderMatrix(); updateAllCalculations();
        }
        function populateIncSelect() { document.getElementById('inc-inst').innerHTML = instruments.map(x => `<option value="${x.id}">${x.name}</option>`).join(''); }
        function exportData() { const b = new Blob([JSON.stringify({ instruments, allocations, incomes })], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `portofoliu_backup.json`; a.click(); }

        window.onload = () => { renderMatrix(); updateAllCalculations(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Management Investiții (2024-2040)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sticky-col { position: sticky; left: 0; background: white; z-index: 20; border-right: 2px solid #e2e8f0; }
        .table-container { overflow-x: auto; max-height: 75vh; border-radius: 8px; }
        .month-input { width: 90px; text-align: right; font-size: 11px; padding: 4px; border: 1px solid #edf2f7; border-radius: 3px; }
        .month-input:focus { outline: none; border-color: #4299e1; background-color: #ebf8ff; }
        .tab-active { border-bottom: 3px solid #3182ce; color: #2b6cb0; font-weight: bold; }
        th { font-size: 11px; font-weight: bold; text-transform: uppercase; background: #f7fafc; padding: 8px; border: 1px solid #edf2f7; }
        .year-header { background: #2d3748; color: white; border: 1px solid #4a5568; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- HEADER: CURS SI TOTAL -->
    <header class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-[1800px] mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3 text-2xl font-black text-slate-800">
                <span class="bg-blue-600 text-white p-2 rounded-lg">INV</span> 
                <h1>PORTOFOLIU PERSONAL</h1>
            </div>
            <div class="flex flex-wrap gap-4 items-center">
                <div class="flex gap-2 bg-blue-50 p-2 rounded border border-blue-100">
                    <label class="text-[10px] font-bold uppercase text-blue-400 self-center">EUR/MDL</label>
                    <input type="number" id="cEUR" value="19.7215" step="0.0001" class="w-20 font-bold bg-transparent" oninput="updateAll()">
                </div>
                <div class="flex gap-2 bg-green-50 p-2 rounded border border-green-100">
                    <label class="text-[10px] font-bold uppercase text-green-400 self-center">USD/MDL</label>
                    <input type="number" id="cUSD" value="16.6933" step="0.0001" class="w-20 font-bold bg-transparent" oninput="updateAll()">
                </div>
                <div class="flex gap-2 bg-yellow-50 p-2 rounded border border-yellow-100">
                    <label class="text-[10px] font-bold uppercase text-yellow-400 self-center">RON/MDL</label>
                    <input type="number" id="cRON" value="3.8863" step="0.0001" class="w-20 font-bold bg-transparent" oninput="updateAll()">
                </div>
                <div class="bg-slate-900 text-white px-6 py-2 rounded-lg shadow-lg">
                    <p class="text-[10px] uppercase opacity-60">Valoare Totală Portofoliu</p>
                    <p id="totalPortfolio" class="text-xl font-bold">0.00 MDL</p>
                </div>
            </div>
        </div>
    </header>

    <!-- NAVIGATION TABS -->
    <nav class="bg-white border-b mb-6">
        <div class="max-w-[1800px] mx-auto px-4 flex gap-8">
            <button onclick="switchTab('tab-summary')" class="tab-btn py-4 px-2 tab-active" id="btn-summary">Situația la zi</button>
            <button onclick="switchTab('tab-alocari')" class="tab-btn py-4 px-2 text-gray-500" id="btn-alocari">Alocări Lunare (Matrix)</button>
            <button onclick="switchTab('tab-venituri')" class="tab-btn py-4 px-2 text-gray-500" id="btn-venituri">Cupoane & Dividende</button>
            <button onclick="switchTab('tab-structura')" class="tab-btn py-4 px-2 text-gray-500" id="btn-structura">Structură & Performanță</button>
        </div>
    </nav>

    <main class="max-w-[1800px] mx-auto px-4 pb-20">
        
        <!-- BLOC 1: SITUATIA LA ZI -->
        <section id="tab-summary" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white rounded-xl border shadow-sm p-4">
                    <h2 class="font-bold text-lg mb-4 flex items-center gap-2"><i class="fa fa-list"></i> Lista Active</h2>
                    <div id="summaryTableContainer" class="overflow-x-auto"></div>
                </div>
                <div class="bg-white rounded-xl border shadow-sm p-6">
                    <h2 class="font-bold text-lg mb-4 text-center">Asset Allocation</h2>
                    <canvas id="allocationChart"></canvas>
                </div>
            </div>
        </section>

        <!-- BLOC 2: ALOCARI LUNARE -->
        <section id="tab-alocari" class="tab-content hidden">
            <div class="bg-white rounded-xl border shadow-sm p-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-lg">Matrice Alocări 2024 - 2040</h2>
                    <p class="text-xs text-gray-400 italic">Derulați spre dreapta pentru viitor &rarr;</p>
                </div>
                <div class="table-container">
                    <table class="w-full border-collapse">
                        <thead id="matrixHead"></thead>
                        <tbody id="matrixBody"></tbody>
                    </table>
                </div>
                <div class="mt-4 flex gap-4">
                    <button onclick="exportData()" class="bg-slate-100 text-slate-700 px-4 py-2 rounded text-sm hover:bg-slate-200 font-medium">Descarcă Backup (JSON)</button>
                    <button onclick="addInstrumentPrompt()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700 font-medium">+ Adaugă Instrument</button>
                </div>
            </div>
        </section>

        <!-- BLOC 3: VENITURI -->
        <section id="tab-venituri" class="tab-content hidden text-center py-20 bg-white rounded-xl border">
            <p class="text-gray-400">Secțiune în dezvoltare. Aici vor fi introduse cupoanele Fidelis și dividendele BVB.</p>
        </section>

        <!-- BLOC 4: STRUCTURA -->
        <section id="tab-structura" class="tab-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="statsContainer"></div>
        </section>

    </main>

    <script>
        // INSTRUMENTELE DIN EXCELUL TAU
        const initialInstruments = [
            { id: "tvbetetf", name: "FDI ETF BET Patria-Tradeville", cat: "Acțiuni", valuta: "RON", bursa: "BVB" },
            { id: "fp", name: "Fondul Proprietatea", cat: "Acțiuni", valuta: "RON", bursa: "BVB" },
            { id: "snp", name: "OMV Petrom S.A.", cat: "Acțiuni", valuta: "RON", bursa: "BVB" },
            { id: "tlv", name: "Banca Transilvania", cat: "Acțiuni", valuta: "RON", bursa: "BVB" },
            { id: "h2o", name: "Hidroelectrica S.A.", cat: "Acțiuni", valuta: "RON", bursa: "BVB" },
            { id: "sng", name: "Romgaz S.A.", cat: "Acțiuni", valuta: "RON", bursa: "BVB" },
            { id: "brd", name: "BRD GSG", cat: "Acțiuni", valuta: "RON", bursa: "BVB" },
            { id: "pe", name: "Premier Energy", cat: "Acțiuni", valuta: "RON", bursa: "BVB" },
            { id: "r2512a", name: "Fidelis R2512A", cat: "Obligațiuni", valuta: "RON", bursa: "BVB" },
            { id: "r2612a", name: "Fidelis R2612A", cat: "Obligațiuni", valuta: "RON", bursa: "BVB" },
            { id: "r2908ae", name: "Fidelis R2908AE", cat: "Obligațiuni", valuta: "EUR", bursa: "BVB" },
            { id: "sxr8", name: "iShares Core S&P 500", cat: "Acțiuni", valuta: "EUR", bursa: "Frankfurt" },
            { id: "iwda", name: "iShares MSCI World", cat: "Acțiuni", valuta: "USD", bursa: "Londra" },
            { id: "igln", name: "iShares Physical Gold", cat: "Aur", valuta: "USD", bursa: "Londra" },
            { id: "vbtc", name: "VanEck Bitcoin ETN", cat: "Crypto", valuta: "EUR", bursa: "Amsterdam" },
            { id: "mdl_bond", name: "Obligațiuni de Stat RM", cat: "Obligațiuni", valuta: "MDL", bursa: "MF RM" },
            { id: "cash", name: "Depozite Bancare", cat: "Cash", valuta: "MDL", bursa: "MICB" }
        ];

        let instruments = JSON.parse(localStorage.getItem('instruments')) || initialInstruments;
        let data = JSON.parse(localStorage.getItem('portfolioData')) || {};
        let years = []; for(let i=2024; i<=2040; i++) years.push(i);
        let months = ["Ian", "Feb", "Mar", "Apr", "Mai", "Iun", "Iul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        let chartInstance;

        function init() {
            renderMatrixHeaders();
            renderMatrixBody();
            updateAll();
        }

        function renderMatrixHeaders() {
            let htmlYears = `<tr><th class="sticky-col min-w-[200px] bg-slate-100">Instrument / An</th>`;
            let htmlMonths = `<tr><th class="sticky-col bg-slate-100">Moneda / Luna</th>`;
            
            years.forEach(y => {
                htmlYears += `<th colspan="12" class="year-header">${y}</th>`;
                months.forEach(m => {
                    htmlMonths += `<th>${m}</th>`;
                });
            });
            document.getElementById('matrixHead').innerHTML = htmlYears + "</tr>" + htmlMonths + "</tr>";
        }

        function renderMatrixBody() {
            let html = '';
            instruments.forEach(inst => {
                html += `<tr><td class="sticky-col p-2 font-bold text-xs border-r">${inst.name} <br><span class="text-[9px] text-gray-400 uppercase">${inst.valuta}</span></td>`;
                years.forEach(y => {
                    months.forEach(m => {
                        let key = `${inst.id}-${y}-${m}`;
                        let val = data[key] || '';
                        html += `<td><input type="number" class="month-input" value="${val}" oninput="saveValue('${key}', this.value)"></td>`;
                    });
                });
                html += `</tr>`;
            });
            document.getElementById('matrixBody').innerHTML = html;
        }

        function saveValue(key, val) {
            if(val === "") delete data[key];
            else data[key] = parseFloat(val);
            localStorage.setItem('portfolioData', JSON.stringify(data));
            updateAll();
        }

        function updateAll() {
            const ron = parseFloat(document.getElementById('cRON').value);
            const eur = parseFloat(document.getElementById('cEUR').value);
            const usd = parseFloat(document.getElementById('cUSD').value);
            
            let totalMDL = 0;
            let summaryHtml = `<table class="w-full text-sm"><thead><tr><th class="text-left p-2">Activ</th><th>Categorie</th><th>Bursa</th><th>Valoare Orig.</th><th class="text-right">MDL</th></tr></thead><tbody>`;
            let allocationData = {};

            instruments.forEach(inst => {
                // Luam ultima valoare completata (Situația la zi)
                let currentVal = 0;
                for(let y=2040; y>=2024; y--) {
                    for(let mi=11; mi>=0; mi--) {
                        let val = data[`${inst.id}-${y}-${months[mi]}`];
                        if(val > 0) { currentVal = val; break; }
                    }
                    if(currentVal > 0) break;
                }

                let curs = inst.valuta === 'RON' ? ron : inst.valuta === 'EUR' ? eur : inst.valuta === 'USD' ? usd : 1;
                let valMDL = currentVal * curs;
                totalMDL += valMDL;
                
                if(valMDL > 0) {
                    allocationData[inst.cat] = (allocationData[inst.cat] || 0) + valMDL;
                    summaryHtml += `<tr class="border-b"><td class="p-2 font-bold">${inst.name}</td><td>${inst.cat}</td><td class="text-gray-400">${inst.bursa}</td><td>${currentVal.toLocaleString()} ${inst.valuta}</td><td class="text-right font-bold text-blue-600">${valMDL.toLocaleString(undefined, {minimumFractionDigits: 2})}</td></tr>`;
                }
            });

            summaryHtml += `</tbody></table>`;
            document.getElementById('summaryTableContainer').innerHTML = summaryHtml;
            document.getElementById('totalPortfolio').innerText = totalMDL.toLocaleString(undefined, {minimumFractionDigits: 2}) + " MDL";
            
            updateChart(allocationData);
        }

        function updateChart(map) {
            const ctx = document.getElementById('allocationChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(map),
                    datasets: [{
                        data: Object.values(map),
                        backgroundColor: ['#1e293b', '#3182ce', '#38a169', '#d69e2e', '#e53e3e', '#805ad5', '#718096']
                    }]
                },
                options: { plugins: { legend: { position: 'bottom' } } }
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId.split('-')[1]).classList.add('tab-active');
            if(tabId === 'tab-summary') updateAll();
        }

        function exportData() {
            const blob = new Blob([JSON.stringify({data, instruments, config: {
                eur: document.getElementById('cEUR').value,
                usd: document.getElementById('cUSD').value,
                ron: document.getElementById('cRON').value
            }})], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `backup_portofoliu_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
